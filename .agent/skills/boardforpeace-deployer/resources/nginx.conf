server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.bunny.net; font-src 'self' https://fonts.gstatic.com https://fonts.bunny.net; img-src 'self' data: blob: https://*.googleusercontent.com https://unpkg.com; connect-src 'self' wss://boardforpeace.foundation https://cdn.jsdelivr.net; frame-ancestors 'self';" always;

    index index.php;

    charset utf-8;

    # Deny access to hidden files (except .well-known for ACME challenges)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Restrict HTTP methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets — long cache, no-transform
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Pass real client IP from proxy
        fastcgi_param REMOTE_ADDR $http_x_real_ip;
        # Larger buffers for Inertia responses (Testing page sends all report data as props)
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;
    }
}
