apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boardforpeace-web
  namespace: boardforpeace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # HSTS — force HTTPS for 1 year, include subdomains, preload-ready
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    # Rate limiting — 20 req/sec per IP, burst of 40
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    # Request size limit
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Buffer size for upstream headers — Inertia responses carry large headers
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - boardforpeace.foundation
      secretName: boardforpeace.foundation-tls
  rules:
    - host: boardforpeace.foundation
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boardforpeace-web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boardforpeace-reverb
  namespace: boardforpeace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - boardforpeace.foundation
      secretName: boardforpeace.foundation-tls
  rules:
    - host: boardforpeace.foundation
      http:
        paths:
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: boardforpeace-reverb
                port:
                  number: 8080
