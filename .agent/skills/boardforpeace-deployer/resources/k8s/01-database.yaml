apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: boardforpeace
  labels:
    app: boardforpeace
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boardforpeace
      tier: database
  template:
    metadata:
      labels:
        app: boardforpeace
        tier: database
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.6
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "password"
            - name: MARIADB_DATABASE
              value: "boardforpeace_pool"
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: boardforpeace
spec:
  selector:
    app: boardforpeace
    tier: database
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP
