apiVersion: v1
kind: ConfigMap
metadata:
  name: boardforpeace-chia-config
  namespace: boardforpeace
data:
  CHIA_NODE_HOST: "chia-node-rpc.chia.svc.cluster.local"
  CHIA_NODE_PORT: "8555"
  CHIA_SSL_CA_PATH: "/etc/chia/ssl/ca/private_ca.crt"
  CHIA_SSL_CRT_PATH: "/etc/chia/ssl/certificates/private_full_node.crt"
  CHIA_SSL_KEY_PATH: "/etc/chia/ssl/certificates/private_full_node.key"
  # Session — production-hardened
  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "true"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "boardforpeace.foundation"
  SESSION_SECURE_COOKIE: "true"
  SESSION_SAME_SITE: "lax"
  SESSION_CONNECTION: "default"
  # Application
  APP_URL: "https://boardforpeace.foundation"
  APP_DEBUG: "true"
  APP_ENV: "production"
  LOG_CHANNEL: "stderr"
  # Redis
  REDIS_HOST: "boardforpeace-redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  REDIS_CLIENT: "predis"
  # Broadcasting / Reverb — server-side (PHP → Reverb internal service)
  BROADCAST_CONNECTION: "reverb"
  REVERB_APP_ID: "boardforpeace-app"
  REVERB_APP_KEY: "boardforpeace-reverb-key"
  REVERB_APP_SECRET: "boardforpeace-reverb-secret"
  REVERB_HOST: "boardforpeace-reverb.boardforpeace.svc.cluster.local"
  REVERB_PORT: "8080"
  REVERB_SCHEME: "http"
  REVERB_SERVER_HOST: "0.0.0.0"
  REVERB_SERVER_PORT: "8080"
  REVERB_SCALING_ENABLED: "true"
  # Vite (baked into JS bundle at build time — browser → Reverb external)
  VITE_REVERB_APP_KEY: "boardforpeace-reverb-key"
  VITE_REVERB_HOST: "boardforpeace.foundation"
  VITE_REVERB_PORT: "443"
  VITE_REVERB_SCHEME: "https"
