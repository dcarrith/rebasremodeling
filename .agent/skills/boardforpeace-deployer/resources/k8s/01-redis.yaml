apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardforpeace-redis
  namespace: boardforpeace
  labels:
    app: boardforpeace-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boardforpeace-redis
  template:
    metadata:
      labels:
        app: boardforpeace-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: boardforpeace-redis
  namespace: boardforpeace
spec:
  selector:
    app: boardforpeace-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
