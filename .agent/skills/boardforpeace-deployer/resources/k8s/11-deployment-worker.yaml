apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardforpeace-worker
  namespace: boardforpeace
  labels:
    app: boardforpeace
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boardforpeace
      tier: worker
  template:
    metadata:
      labels:
        app: boardforpeace
        tier: worker
    spec:
      containers:
        - name: boardforpeace-worker
          image: boardforpeace-app:latest
          imagePullPolicy: IfNotPresent
          command:
            ["/usr/bin/supervisord", "-c", "/etc/supervisord-worker.conf"]
          env:
            - name: APP_ENV
              value: "production"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: boardforpeace-secrets
                  key: app-key
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              value: "mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: "boardforpeace_pool"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: boardforpeace-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boardforpeace-secrets
                  key: db-password
          envFrom:
            - configMapRef:
                name: boardforpeace-chia-config
          volumeMounts:
            - name: boardforpeace-storage
              mountPath: /var/www/html/storage/app/public
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: boardforpeace-storage
          persistentVolumeClaim:
            claimName: boardforpeace-storage
