apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: boardforpeace-web-hpa
  namespace: boardforpeace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: boardforpeace-web
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
